# @format

name: CD

on:
  workflow_call:

jobs:
  deploy:
    runs-on: klvp-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Copy .env file
        run: cp .env.example .env

      - name: Docker Setup [Login]
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Deploy with docker compose
        run: |
          docker compose pull
          docker compose up -d
