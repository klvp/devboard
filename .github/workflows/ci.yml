# @format

# goal: Lint, Build, Test the code for FE and BE & push to Dockerhub

name: CI

on:
  push:
    branches: ["klvp/advanced-practice"]

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        run: actions/checkout@v7

      - name: setup NodeJS
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm install
        working-directory: frontend

      - name: Run lint
        run: npm run lint
        working-directory: frontend

      - name: Run tests
        run: npm run test
        working-directory: frontend

      - name: Docker Setup [Login]
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker Build and Push
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          push: true
          tags: ${{ vars.DOCKERHUB_USERNAME }}/devboard-frontend:latest

  backend:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        run: actions/checkout@v7

      - name: setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.23"
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Run Go Formatter
        run: go fmt
        working-directory: backend

      - name: Run Go Vetter
        run: go vet
        working-directory: backend

      - name: Run tests
        run: go test
        working-directory: backend

      - name: Docker Setup [Login]
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker Build and Push
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          push: true
          tags: ${{ vars.DOCKERHUB_USERNAME }}/devboard-backend:latest
