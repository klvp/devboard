# @format

# goal: Lint, Build, Test the code for FE and BE & push to Dockerhub

name: CI

on:
  push:
    branches: ["matrix-ci"]

jobs:
  frontend-ci:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v7

      - name: setup NodeJS
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm install
        working-directory: frontend

      - name: Run lint
        run: npm run lint
        working-directory: frontend

      - name: Run tests
        run: npm run test
        working-directory: frontend

  backend-ci:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v7

      - name: setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.23"
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Run Go Formatter
        run: go fmt
        working-directory: backend

      - name: Run Go Vetter
        run: go vet
        working-directory: backend

      - name: Run tests
        run: go test
        working-directory: backend

  build-and-push:
    needs: [frontend-ci, backend-ci]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        folders: [frontend, backend]
    steps:
      - name: checkout code
        uses: actions/checkout@v7

      - name: Docker Setup [Login]
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: "Docker Build and Push: ${{matrix.folders}}"
        uses: docker/build-push-action@v7
        with:
          context: ./${{matrix.folders}}
          push: true
          tags: ${{ vars.DOCKERHUB_USERNAME }}/devboard-${{matrix.folders}}:latest

  call_deploy_workflow:
    needs: [frontend-ci, backend-ci, build-and-push]
    uses: ./.github/workflows/cd.yml
    secrets: inherit
